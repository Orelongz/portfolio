<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ───────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ── Primary meta ──────────────────────────────────── -->
    <title>Pelumi Longe | Full-Stack Engineer</title>
    <meta name="description" content="Pelumi Longe is a Full-Stack Engineer with 8+ years of experience building scalable web products with Ruby on Rails, React, and TypeScript. Open to full-time remote roles." />
    <meta name="author" content="Pelumi Longe" />
    <meta name="keywords" content="Pelumi Longe, Full-Stack Engineer, Ruby on Rails, React, TypeScript, PostgreSQL, Product Growth, Remote Engineer, Software Engineer Nigeria" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#6366f1" />

    <!-- ── Canonical ────────────────────────────────────────── -->
    <link rel="canonical" href="https://pelumilonge.dev" />

    <!-- ── Open Graph (LinkedIn, Slack, WhatsApp, etc.) ──── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pelumi Longe | Full-Stack Engineer" />
    <meta property="og:description" content="Full-Stack Engineer with 8+ years building scalable web products with Ruby on Rails, React, and TypeScript. Open to full-time remote roles." />
    <meta property="og:image" content="https://pelumilonge.dev/pelumi-photo.jpg" />
    <meta property="og:image:alt" content="Pelumi Longe — Full-Stack Engineer" />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="800" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:site_name" content="Pelumi Longe" />
    <meta property="og:url" content="https://pelumilonge.dev" />

    <!-- ── Twitter / X Card ───────────────────────────────── -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Pelumi Longe | Full-Stack Engineer" />
    <meta name="twitter:description" content="Full-Stack Engineer with 8+ years building scalable web products with Ruby on Rails, React, and TypeScript." />
    <meta name="twitter:image" content="https://pelumilonge.dev/pelumi-photo.jpg" />
    <meta name="twitter:image:alt" content="Pelumi Longe — Full-Stack Engineer" />
    <meta name="twitter:site" content="@Orelongz" />
    <meta name="twitter:creator" content="@Orelongz" />

    <!-- ── Apply saved theme before React mounts (no flash) ─ -->
    <script>
      (function () {
        var saved = localStorage.getItem('portfolio-theme');
        var theme = saved
          ? saved
          : window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        document.documentElement.classList.remove('dark', 'light');
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
